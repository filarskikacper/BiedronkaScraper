<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="BiedronkaScraper — Dashboard analityczny promocji i cen z gazetek Biedronki. Aktualizowane codziennie.">
    <title>BiedronkaScraper — Dashboard Promocji</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>

<body>


    <header class="header">
        <div class="header-inner">
            <span class="logo-text">BiedronkaScraper</span>
            <span class="header-updated" id="lastUpdated"></span>
        </div>
    </header>

    <section class="controls">
        <div class="controls-inner">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="M21 21l-4.35-4.35" />
                </svg>
                <input type="text" id="searchInput" placeholder="Szukaj produktu..." autocomplete="off">
            </div>
            <div class="filter-group">
                <select id="categoryFilter">
                    <option value="">Wszystkie kategorie</option>
                </select>
                <button id="expiredToggle" class="btn-toggle active">
                    Ukryj nieaktualne
                </button>
            </div>
        </div>
    </section>


    <main class="main">
        <div id="productsGrid" class="products-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Ładowanie promocji...</p>
            </div>
        </div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <p>Brak wyników dla podanych filtrów.</p>
        </div>
    </main>


    <div id="productModal" class="modal-overlay" style="display:none;">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose" aria-label="Zamknij">&times;</button>
            <div id="modalBody">

            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('productsGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const expiredToggle = document.getElementById('expiredToggle');
        const modal = document.getElementById('productModal');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        let hideExpired = true;
        let debounceTimer;
        let priceChart = null;

        let allPromotions = [];

        async function init() {
            try {
                const [promoRes, statsRes] = await Promise.all([
                    fetch('data/promotions.json'),
                    fetch('data/stats.json'),
                ]);
                allPromotions = await promoRes.json();
                const statsData = await statsRes.json();

                if (statsData.categories) {
                    statsData.categories.forEach(cat => {
                        const opt = document.createElement('option');
                        opt.value = cat;
                        opt.textContent = cat;
                        categoryFilter.appendChild(opt);
                    });
                }

                if (statsData.last_updated) {
                    const parts = statsData.last_updated.split('-');
                    document.getElementById('lastUpdated').textContent =
                        `Aktualizacja: ${parts[2]}.${parts[1]}.${parts[0]}`;
                }

                applyFilters();
            } catch (err) {
                grid.innerHTML = '<p class="error-msg">Błąd ładowania danych. Spróbuj odświeżyć stronę.</p>';
                console.error(err);
            }
        }


        function applyFilters() {
            const cat = categoryFilter.value;
            const search = searchInput.value.trim().toLowerCase();

            let filtered = allPromotions;

            if (cat) {
                filtered = filtered.filter(p => p.category === cat);
            }
            if (search) {
                filtered = filtered.filter(p => p.name && p.name.toLowerCase().includes(search));
            }
            if (hideExpired) {
                filtered = filtered.filter(p => !p.is_expired);
            }

            renderProducts(filtered);
        }

        function formatDatePL(isoDate) {
            if (!isoDate) return null;
            const parts = isoDate.split('-');
            if (parts.length !== 3) return isoDate;
            return `${parts[2]}.${parts[1]}`;
        }

        function renderProducts(products) {
            if (!products.length) {
                grid.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            grid.innerHTML = products.map(p => {
                const isExpired = p.is_expired;
                const priceDisplay = p.main_price != null ? p.main_price.toFixed(2).replace('.', ',') + ' zł' : '—';
                const isPromo = p.offer_type === 'promocja';

                const vFrom = formatDatePL(p.valid_from);
                const vTo = formatDatePL(p.valid_to);
                let validityStr = '';
                if (vFrom && vTo) validityStr = `${vFrom} – ${vTo}`;
                else if (vFrom) validityStr = `od ${vFrom}`;
                else if (vTo) validityStr = `do ${vTo}`;

                let details = [p.category || 'Inne'];
                if (p.weight_or_volume) details.push(escapeHtml(p.weight_or_volume));
                if (validityStr) details.push(validityStr);

                let priceInfo = `<span class="card-price${isPromo ? ' card-price--promo' : ''}">${priceDisplay}</span>`;
                if (isPromo && p.old_price != null) {
                    priceInfo = `<span class="card-old-price">${p.old_price.toFixed(2).replace('.', ',')} zł</span> ${priceInfo}`;
                }
                if (isPromo && p.discount_percentage) {
                    priceInfo += ` <span class="card-discount">${escapeHtml(p.discount_percentage)}</span>`;
                }

                return `
        <article class="product-card${isExpired ? ' product-card--expired' : ''}"
                 tabindex="0"
                 data-product='${JSON.stringify(p).replace(/'/g, "&#39;")}'
                 onclick="openModal(this)">
            <h3 class="card-name">${escapeHtml(p.name)}</h3>
            <p class="card-details">${details.join(' · ')}</p>
            <div class="card-bottom">
                <span class="card-prices">${priceInfo}</span>
                ${isPromo ? `<span class="card-label">${isExpired ? 'Była w promocji' : 'Promocja'}</span>` : ''}
            </div>
            ${p.promotion_condition ? `<p class="card-condition">${escapeHtml(p.promotion_condition)}</p>` : ''}
        </article>`;
            }).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }


        function openModal(el) {
            const p = JSON.parse(el.dataset.product);
            const priceDisplay = p.main_price != null ? p.main_price.toFixed(2).replace('.', ',') + ' zł' : '—';
            const lowest30d = p.lowest_price_30d != null ? p.lowest_price_30d.toFixed(2).replace('.', ',') + ' zł' : '—';
            const isPromo = p.offer_type === 'promocja';

            let oldPriceHtml = '';
            if (isPromo && p.old_price != null) {
                oldPriceHtml = `<span class="modal-old-price">${p.old_price.toFixed(2).replace('.', ',')} zł</span>`;
            }

            let discountHtml = '';
            if (isPromo && p.discount_percentage) {
                discountHtml = `<span class="modal-discount-badge">${escapeHtml(p.discount_percentage)}</span>`;
            }

            const vFrom = formatDatePL(p.valid_from);
            const vTo = formatDatePL(p.valid_to);
            let validityStr = '—';
            if (vFrom && vTo) validityStr = `${vFrom} – ${vTo}`;
            else if (vFrom) validityStr = `od ${vFrom}`;
            else if (vTo) validityStr = `do ${vTo}`;

            let leafletsHtml = p.date_label || '—';
            if (p.date_labels && p.date_labels.length > 1) {
                leafletsHtml = p.date_labels.join(', ');
            }

            modalBody.innerHTML = `
        <p class="modal-sub">${p.category || 'Inne'}${p.is_expired ? ' · Nieaktualna' : ''}</p>
        <h2 class="modal-title">${escapeHtml(p.name)}</h2>
        ${p.weight_or_volume ? `<p class="modal-sub">${escapeHtml(p.weight_or_volume)}</p>` : ''}

        <div class="modal-price-line">
            ${oldPriceHtml}
            <span class="modal-price${isPromo ? ' modal-price--promo' : ''}">${priceDisplay}</span>
            ${discountHtml}
            ${isPromo ? '<span class="modal-label">Promocja</span>' : ''}
        </div>

        ${p.promotion_condition ? `<p class="modal-info">Warunek: ${escapeHtml(p.promotion_condition)}</p>` : ''}
        <p class="modal-info">Najniższa cena z 30 dni: ${lowest30d}</p>
        <p class="modal-info">Gazetka: ${leafletsHtml}</p>
        <p class="modal-info">Ważność: ${validityStr}</p>

        ${p.image_url ? `
        <div class="modal-section">
            <p class="modal-section-title">Strona gazetki</p>
            <a href="${p.image_url}" target="_blank" rel="noopener">
                <img src="${p.image_url}" alt="Strona gazetki" class="modal-leaflet-image" loading="lazy">
            </a>
        </div>` : ''}

        <div class="modal-section">
            <p class="modal-section-title">Historia cen</p>
            <div class="chart-container">
                <canvas id="priceChartCanvas"></canvas>
            </div>
            <div id="chartLoading" class="chart-loading">
                <div class="spinner spinner--small"></div>
                <span>Ładowanie wykresu...</span>
            </div>
            <div id="chartEmpty" class="chart-empty" style="display:none;">
                Brak danych historii cen dla tego produktu.
            </div>
        </div>
    `;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            requestAnimationFrame(() => modal.classList.add('modal-visible'));

            loadPriceChart(p.product_id);
        }

        function closeModal() {
            modal.classList.remove('modal-visible');
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = '';
                if (priceChart) {
                    priceChart.destroy();
                    priceChart = null;
                }
            }, 250);
        }

        async function loadPriceChart(productId) {
            const chartLoading = document.getElementById('chartLoading');
            const chartEmpty = document.getElementById('chartEmpty');
            const canvas = document.getElementById('priceChartCanvas');

            try {
                const res = await fetch(`data/history/${productId}.json`);
                if (!res.ok) {
                    chartLoading.style.display = 'none';
                    chartEmpty.style.display = 'block';
                    canvas.style.display = 'none';
                    return;
                }

                const data = await res.json();

                chartLoading.style.display = 'none';

                if (!data.history || data.history.length === 0) {
                    chartEmpty.style.display = 'block';
                    canvas.style.display = 'none';
                    return;
                }

                const labels = data.history.map(h => {
                    const d = h.date.split('-');
                    return `${d[2]}.${d[1]}.${d[0]}`;
                });
                const prices = data.history.map(h => h.price);

                priceChart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Cena (zł)',
                            data: prices,
                            borderColor: '#E67E22',
                            backgroundColor: 'rgba(230, 126, 34, 0.08)',
                            borderWidth: 2.5,
                            pointBackgroundColor: '#E67E22',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            fill: true,
                            tension: 0.3,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(26, 26, 46, 0.9)',
                                titleFont: { family: "'Inter', sans-serif", weight: '600' },
                                bodyFont: { family: "'Inter', sans-serif" },
                                padding: 12,
                                cornerRadius: 8,
                                callbacks: {
                                    label: ctx => `${ctx.parsed.y.toFixed(2).replace('.', ',')} zł`
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: {
                                    font: { family: "'Inter', sans-serif", size: 11 },
                                    color: '#9494A8',
                                    maxRotation: 45,
                                }
                            },
                            y: {
                                grid: { color: 'rgba(232, 230, 225, 0.6)' },
                                ticks: {
                                    font: { family: "'Inter', sans-serif", size: 11, weight: '500' },
                                    color: '#5A5A72',
                                    callback: val => val.toFixed(2).replace('.', ',') + ' zł',
                                },
                                beginAtZero: false,
                            }
                        },
                        interaction: {
                            intersect: false,
                            mode: 'index',
                        }
                    }
                });

            } catch (err) {
                chartLoading.style.display = 'none';
                chartEmpty.textContent = 'Błąd ładowania historii cen.';
                chartEmpty.style.display = 'block';
                canvas.style.display = 'none';
            }
        }


        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(applyFilters, 200);
        });

        categoryFilter.addEventListener('change', applyFilters);

        expiredToggle.addEventListener('click', () => {
            hideExpired = !hideExpired;
            expiredToggle.classList.toggle('active', hideExpired);
            applyFilters();
        });

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
        });


        init();
    </script>
</body>

</html>
