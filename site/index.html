<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="BiedronkaScraper — Dashboard analityczny promocji i cen z gazetek Biedronki. Aktualizowane codziennie.">
    <title>BiedronkaScraper — Dashboard Promocji</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>

<body>


    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-text">BiedronkaScraper</span>
            </div>
            <span class="header-updated" id="lastUpdated"></span>
        </div>
    </header>


    <section class="stats-bar">
        <div class="stats-inner">
            <div class="stat-card">
                <span class="stat-value" id="statLeaflets">—</span>
                <span class="stat-label">Gazetek</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="statProducts">—</span>
                <span class="stat-label">Produktów</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="statPromotions">—</span>
                <span class="stat-label">Promocji</span>
            </div>
            <div class="stat-card stat-card--expired">
                <span class="stat-value" id="statExpired">—</span>
                <span class="stat-label">Nieaktualnych</span>
            </div>
        </div>
    </section>


    <section class="controls">
        <div class="controls-inner">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="M21 21l-4.35-4.35" />
                </svg>
                <input type="text" id="searchInput" placeholder="Szukaj produktu..." autocomplete="off">
            </div>
            <div class="filter-group">
                <select id="categoryFilter">
                    <option value="">Wszystkie kategorie</option>
                </select>
                <button id="expiredToggle" class="btn-toggle active" data-active="true">
                    <span class="toggle-dot"></span>
                    Ukryj nieaktualne
                </button>
            </div>
        </div>
    </section>


    <main class="main">
        <div id="productsGrid" class="products-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Ładowanie promocji...</p>
            </div>
        </div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <p>Brak wyników dla podanych filtrów.</p>
        </div>
    </main>


    <div id="productModal" class="modal-overlay" style="display:none;">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose" aria-label="Zamknij">&times;</button>
            <div id="modalBody">

            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('productsGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const expiredToggle = document.getElementById('expiredToggle');
        const modal = document.getElementById('productModal');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        let hideExpired = true;
        let debounceTimer;
        let priceChart = null;


        let allPromotions = [];
        let statsData = {};


        async function init() {
            try {
                const [promoRes, statsRes] = await Promise.all([
                    fetch('data/promotions.json'),
                    fetch('data/stats.json'),
                ]);
                allPromotions = await promoRes.json();
                statsData = await statsRes.json();


                document.getElementById('statLeaflets').textContent = statsData.leaflets;
                document.getElementById('statProducts').textContent = statsData.products;
                document.getElementById('statPromotions').textContent = statsData.promotions;
                document.getElementById('statExpired').textContent = statsData.expired;


                if (statsData.categories) {
                    statsData.categories.forEach(cat => {
                        const opt = document.createElement('option');
                        opt.value = cat;
                        opt.textContent = cat;
                        categoryFilter.appendChild(opt);
                    });
                }


                if (statsData.last_updated) {
                    const parts = statsData.last_updated.split('-');
                    document.getElementById('lastUpdated').textContent =
                        `Aktualizacja: ${parts[2]}.${parts[1]}.${parts[0]}`;
                }

                applyFilters();
            } catch (err) {
                grid.innerHTML = '<p class="error-msg">Błąd ładowania danych. Spróbuj odświeżyć stronę.</p>';
                console.error(err);
            }
        }


        function applyFilters() {
            const cat = categoryFilter.value;
            const search = searchInput.value.trim().toLowerCase();

            let filtered = allPromotions;

            if (cat) {
                filtered = filtered.filter(p => p.category === cat);
            }
            if (search) {
                filtered = filtered.filter(p => p.name && p.name.toLowerCase().includes(search));
            }
            if (hideExpired) {
                filtered = filtered.filter(p => !p.is_expired);
            }

            renderProducts(filtered);
        }

        function formatDatePL(isoDate) {
            if (!isoDate) return null;
            const parts = isoDate.split('-');
            if (parts.length !== 3) return isoDate;
            return `${parts[2]}.${parts[1]}`;
        }

        function renderProducts(products) {
            if (!products.length) {
                grid.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            grid.innerHTML = products.map(p => {
                const isExpired = p.is_expired;
                const priceDisplay = p.main_price != null ? p.main_price.toFixed(2).replace('.', ',') + ' zł' : '—';
                const isPromo = p.offer_type === 'promocja';


                const vFrom = formatDatePL(p.valid_from);
                const vTo = formatDatePL(p.valid_to);
                let validityStr = '';
                if (vFrom && vTo) validityStr = `${vFrom} – ${vTo}`;
                else if (vFrom) validityStr = `od ${vFrom}`;
                else if (vTo) validityStr = `do ${vTo}`;

                return `
        <article class="product-card ${isExpired ? 'product-card--expired' : ''}"
                 tabindex="0"
                 data-product='${JSON.stringify(p).replace(/'/g, "&#39;")}'
                 onclick="openModal(this)">
            <div class="product-meta">
                <span class="product-category">${p.category || 'Inne'}</span>
                <span class="product-date-range">${validityStr || p.date_label || ''}</span>
            </div>
            <div class="product-body">
                <h3 class="product-name">${escapeHtml(p.name)}</h3>
                ${p.weight_or_volume ? `<span class="product-weight">${escapeHtml(p.weight_or_volume)}</span>` : ''}
            </div>
            <div class="product-footer">
                <div class="product-price-container">
                    <span class="product-price ${isPromo ? 'product-price--promo' : ''}">${priceDisplay}</span>
                    ${isPromo ? `<span class="promo-tag">${isExpired ? 'Była w promocji' : 'Promocja'}</span>` : ''}
                </div>
                ${p.promotion_condition ? `<div class="product-condition">${escapeHtml(p.promotion_condition)}</div>` : ''}
            </div>
        </article>`;
            }).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }


        function openModal(el) {
            const p = JSON.parse(el.dataset.product);
            const priceDisplay = p.main_price != null ? p.main_price.toFixed(2).replace('.', ',') + ' zł' : '—';
            const lowest30d = p.lowest_price_30d != null ? p.lowest_price_30d.toFixed(2).replace('.', ',') + ' zł' : '—';
            const min30dCalc = p.min_price_30d_calculated != null ? p.min_price_30d_calculated.toFixed(2).replace('.', ',') + ' zł' : '—';
            const isPromo = p.offer_type === 'promocja';

            const vFrom = formatDatePL(p.valid_from);
            const vTo = formatDatePL(p.valid_to);
            let validityStr = '—';
            if (vFrom && vTo) validityStr = `${vFrom} – ${vTo}`;
            else if (vFrom) validityStr = `od ${vFrom}`;
            else if (vTo) validityStr = `do ${vTo}`;

            modalBody.innerHTML = `
        <div class="modal-header-section">
            <span class="modal-category">${p.category || 'Inne'}</span>
            ${p.is_expired ? '<span class="modal-expired">Nieaktualna</span>' : '<span class="modal-active">Aktualna</span>'}
        </div>
        <h2 class="modal-title">${escapeHtml(p.name)}</h2>
        ${p.weight_or_volume ? `<p class="modal-weight">${escapeHtml(p.weight_or_volume)}</p>` : ''}

        <div class="modal-price-section">
            <span class="modal-price ${isPromo ? 'modal-price--promo' : ''}">${priceDisplay}</span>
            ${isPromo ? '<span class="promo-badge">PROMOCJA</span>' : '<span class="regular-badge">Cena regularna</span>'}
        </div>

        ${p.promotion_condition ? `<div class="modal-detail-row"><span class="modal-detail-label">Warunek:</span><span class="modal-detail-value">${escapeHtml(p.promotion_condition)}</span></div>` : ''}
        <div class="modal-detail-row"><span class="modal-detail-label">Najniższa z 30 dni (etykieta):</span><span class="modal-detail-value">${lowest30d}</span></div>
        <div class="modal-detail-row"><span class="modal-detail-label">Min. cena 30 dni (obliczona):</span><span class="modal-detail-value">${min30dCalc}</span></div>
        <div class="modal-detail-row"><span class="modal-detail-label">Gazetka:</span><span class="modal-detail-value">${p.date_label || '—'}</span></div>
        <div class="modal-detail-row"><span class="modal-detail-label">Ważność:</span><span class="modal-detail-value">${validityStr}</span></div>
        ${p.source_image ? `<div class="modal-detail-row"><span class="modal-detail-label">Źródłowy obraz:</span><span class="modal-detail-value">${escapeHtml(p.source_image)}</span></div>` : ''}

        <div class="modal-chart-section">
            <h3 class="modal-chart-title">Historia cen</h3>
            <div class="chart-container">
                <canvas id="priceChartCanvas"></canvas>
            </div>
            <div id="chartLoading" class="chart-loading">
                <div class="spinner spinner--small"></div>
                <span>Ładowanie wykresu...</span>
            </div>
            <div id="chartEmpty" class="chart-empty" style="display:none;">
                Brak danych historii cen dla tego produktu.
            </div>
        </div>
    `;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            requestAnimationFrame(() => modal.classList.add('modal-visible'));

            loadPriceChart(p.product_id);
        }

        function closeModal() {
            modal.classList.remove('modal-visible');
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = '';
                if (priceChart) {
                    priceChart.destroy();
                    priceChart = null;
                }
            }, 250);
        }

        async function loadPriceChart(productId) {
            const chartLoading = document.getElementById('chartLoading');
            const chartEmpty = document.getElementById('chartEmpty');
            const canvas = document.getElementById('priceChartCanvas');

            try {
                const res = await fetch(`data/history/${productId}.json`);
                if (!res.ok) {
                    chartLoading.style.display = 'none';
                    chartEmpty.style.display = 'block';
                    canvas.style.display = 'none';
                    return;
                }

                const data = await res.json();

                chartLoading.style.display = 'none';

                if (!data.history || data.history.length === 0) {
                    chartEmpty.style.display = 'block';
                    canvas.style.display = 'none';
                    return;
                }

                const labels = data.history.map(h => {
                    const d = h.date.split('-');
                    return `${d[2]}.${d[1]}.${d[0]}`;
                });
                const prices = data.history.map(h => h.price);

                priceChart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Cena (zł)',
                            data: prices,
                            borderColor: '#E67E22',
                            backgroundColor: 'rgba(230, 126, 34, 0.08)',
                            borderWidth: 2.5,
                            pointBackgroundColor: '#E67E22',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            fill: true,
                            tension: 0.3,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(26, 26, 46, 0.9)',
                                titleFont: { family: "'DM Sans', sans-serif", weight: '600' },
                                bodyFont: { family: "'DM Sans', sans-serif" },
                                padding: 12,
                                cornerRadius: 8,
                                callbacks: {
                                    label: ctx => `${ctx.parsed.y.toFixed(2).replace('.', ',')} zł`
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: {
                                    font: { family: "'DM Sans', sans-serif", size: 11 },
                                    color: '#9494A8',
                                    maxRotation: 45,
                                }
                            },
                            y: {
                                grid: { color: 'rgba(232, 230, 225, 0.6)' },
                                ticks: {
                                    font: { family: "'DM Sans', sans-serif", size: 11, weight: '500' },
                                    color: '#5A5A72',
                                    callback: val => val.toFixed(2).replace('.', ',') + ' zł',
                                },
                                beginAtZero: false,
                            }
                        },
                        interaction: {
                            intersect: false,
                            mode: 'index',
                        }
                    }
                });

            } catch (err) {
                chartLoading.style.display = 'none';
                chartEmpty.textContent = 'Błąd ładowania historii cen.';
                chartEmpty.style.display = 'block';
                canvas.style.display = 'none';
            }
        }


        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(applyFilters, 200);
        });

        categoryFilter.addEventListener('change', applyFilters);

        expiredToggle.addEventListener('click', () => {
            hideExpired = !hideExpired;
            expiredToggle.dataset.active = hideExpired;
            expiredToggle.classList.toggle('active', hideExpired);
            applyFilters();
        });

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
        });


        init();
    </script>
</body>

</html>
